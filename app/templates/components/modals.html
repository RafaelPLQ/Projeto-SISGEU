<div class="modal-overlay" id="modal-add">
  <div class="modal">

    <div class="modal-header">
      <div class="modal-title">Novo Lançamento</div>
      <button class="modal-close" onclick="closeModal('modal-add')">✕</button>
    </div>

    <div class="modal-body">

      <!-- Seleção de tipo (Despesa / Receita) -->
      <div class="form-group">
        <label class="form-label">Tipo</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <button id="btn-despesa" class="btn btn-danger"    style="justify-content:center;padding:10px" onclick="setTipo('despesa')">↓ Despesa</button>
          <button id="btn-receita" class="btn btn-secondary" style="justify-content:center;padding:10px" onclick="setTipo('receita')">↑ Receita</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Descrição</label>
        <input class="form-input" type="text" placeholder="Ex: iFood, Bolsa PIBIC..." />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Valor (R$)</label>
          <input class="form-input mono" type="number" placeholder="0,00" />
        </div>
        <div class="form-group">
          <label class="form-label">Data</label>
          <input class="form-input" type="date" id="input-data" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Categoria</label>
        <select class="form-select">
          <option>🍔 Alimentação</option>
          <option>🚌 Transporte</option>
          <option>📚 Educação</option>
          <option>🎮 Lazer</option>
          <option>🏠 Moradia</option>
          <option>💰 Bolsa/Estágio</option>
          <option>🔧 Outros</option>
        </select>
      </div>

    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-add')">Cancelar</button>
      <button class="btn btn-primary"   onclick="saveTransaction()">Salvar Lançamento</button>
    </div>

  </div>
</div>

<!-- 4.2 Modal: Nova Meta -->
<div class="modal-overlay" id="modal-meta">
  <div class="modal">

    <div class="modal-header">
      <div class="modal-title">Nova Meta Financeira</div>
      <button class="modal-close" onclick="closeModal('modal-meta')">✕</button>
    </div>

    <div class="modal-body">

      <div class="form-group">
        <label class="form-label">Nome da Meta</label>
        <input class="form-input" type="text" placeholder="Ex: Viagem de formatura, Notebook..." />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Valor Alvo (R$)</label>
          <input class="form-input mono" type="number" placeholder="0,00" />
        </div>
        <div class="form-group">
          <label class="form-label">Prazo</label>
          <input class="form-input" type="month" id="input-prazo" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Ícone / Categoria</label>
        <select class="form-select">
          <option>🏖️ Viagem</option>
          <option>🖥️ Equipamento</option>
          <option>🛡️ Reserva de Emergência</option>
          <option>📚 Educação</option>
          <option>🏠 Moradia</option>
          <option>🎉 Outros</option>
        </select>
      </div>

    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-meta')">Cancelar</button>
      <button class="btn btn-primary"   onclick="saveMeta()">Criar Meta</button>
    </div>

  </div>
</div>


<!-- ============================================================
     5. TOAST – Notificação flutuante
     ============================================================ -->

<div class="toast" id="toast">
  <span class="toast-icon" id="toast-icon">✓</span>
  <span id="toast-msg">Operação realizada!</span>
</div>
